<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MOCHI</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #e8a0c0;
      --pink-light: #f5d0e0;
      --pink-dark: #d06890;
      --green: #7ab860;
      --green-light: #c8f0a0;
      --lavender: #b090d8;
      --lavender-light: #e8d8f8;
      --cream: #fff8e8;
      --text: #3a2a4a;
      --text-soft: #7a6a8a;
      --orange: #e0903a;
      --orange-light: #fde0b0;
      --blue: #5888c8;
      --blue-light: #c0d8f0;
      --teal: #50b0a8;
      --teal-light: #b0e8e0;
      --brown: #a07050;
      --brown-light: #e8d0b8;
      --rust: #a06840;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--text);
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    .app {
      display: flex; flex-direction: column; height: 100vh;
      background: linear-gradient(135deg, var(--cream) 0%, var(--pink-light) 100%);
    }

    /* ── HEADER ── */
    .header {
      padding: 8px 14px; border-bottom: 2px solid var(--pink);
      background: rgba(255,248,232,0.97);
      display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
    }
    .header-left   { display: flex; flex-direction: column; gap: 2px; }
    .title         { font-size: 13px; letter-spacing: 3px; color: var(--pink-dark); }
    .header-sub    { font-size: 5px; color: var(--text-soft); letter-spacing: 1px; }
    .evo-badge     { font-size: 4px; color: var(--lavender); letter-spacing: 0.5px; display: inline-block; margin-top: 1px; }
    .pet-name-display { font-size: 7px; color: var(--text-soft); letter-spacing: 1px; text-align: center; }
    .header-btns   { display: flex; gap: 5px; }
    .btn-icon {
      background: transparent; border: 1.5px solid var(--pink); color: var(--pink-dark);
      font-size: 12px; width: 30px; height: 30px; display: flex;
      align-items: center; justify-content: center; cursor: pointer;
      font-family: 'Press Start 2P'; transition: all 0.1s; flex-shrink: 0;
    }
    .btn-icon:active { background: var(--pink); color: white; }

    .main   { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; }
    .screen { flex: 1; display: flex; flex-direction: column; }

    /* ── MODALS ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; font-family: 'Press Start 2P';
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--cream); border: 3px solid var(--text);
      padding: 20px; max-width: 90%; max-height: 80vh; overflow-y: auto; text-align: center;
    }
    .modal-title   { font-size: 11px; margin-bottom: 16px; color: var(--pink-dark); letter-spacing: 1px; }
    .modal-text    { font-size: 7px; line-height: 2; color: var(--text); margin-bottom: 14px; }
    .modal-buttons { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .modal-btn {
      background: var(--pink); color: white; border: 1px solid var(--pink-dark);
      font-family: 'Press Start 2P'; font-size: 6px; padding: 8px 12px; cursor: pointer; transition: all 0.1s;
    }
    .modal-btn:active { background: var(--pink-dark); transform: scale(0.95); }

    /* ── PENALTY MODAL ── */
    .penalty-emoji { font-size: 32px; margin-bottom: 10px; display: block; }
    .penalty-stat  { font-size: 5px; color: var(--text-soft); letter-spacing: 1px; margin-bottom: 10px; display: block; }
    .modal-btn.penalty-action { background: var(--lavender); border-color: #8070c8; font-size: 7px; padding: 10px 16px; }

    /* ── INVENTORY MODAL ── */
    .inv-count      { font-size: 5px; color: var(--text-soft); margin-bottom: 10px; letter-spacing: 0.5px; }
    .inventory-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
      margin: 4px 0 14px; max-width: 280px;
    }
    .inv-item { background: var(--lavender-light); border: 1.5px solid var(--lavender); border-radius: 4px; padding: 8px 4px; text-align: center; }
    .inv-emoji { font-size: 18px; line-height: 1; margin-bottom: 4px; display: block; }
    .inv-name  { font-size: 4px; color: var(--text); line-height: 1.8; display: block; }
    .inv-day   { font-size: 3px; color: var(--text-soft); line-height: 2; display: block; }
    .inventory-empty { grid-column: 1/-1; font-size: 6px; color: var(--text-soft); text-align: center; line-height: 2.5; padding: 18px 0; }

    /* ── CHARACTER CREATION ── */
    .creation-screen {
      display: flex; flex-direction: column; align-items: center; gap: 20px; padding-bottom: 24px;
    }
    .creation-title    { font-size: 9px; color: var(--pink-dark); letter-spacing: 2px; text-align: center; }
    .creation-subtitle { font-size: 5px; color: var(--text-soft); letter-spacing: 1px; text-align: center; font-style: italic; }
    .creation-section  { width: 100%; max-width: 340px; }
    .creation-label    { font-size: 5px; color: var(--text-soft); letter-spacing: 1px; margin-bottom: 9px; text-align: left; padding-left: 2px; }

    .archetype-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .archetype-card:last-child:nth-child(odd) { grid-column: 1 / -1; }
    .archetype-card {
      background: white; border: 2px solid var(--lavender); color: var(--text);
      font-family: 'Press Start 2P'; padding: 10px 8px; cursor: pointer;
      transition: all 0.12s; border-radius: 4px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
    }
    .archetype-card.selected { background: var(--lavender-light); border-width: 3px; border-color: var(--lavender); }
    .archetype-card:active   { background: var(--lavender-light); }
    .arch-emoji { font-size: 18px; line-height: 1; }
    .arch-label { font-size: 5px; color: var(--text); letter-spacing: 0.4px; }
    .arch-desc  { font-size: 4px; color: var(--text-soft); line-height: 1.9; font-style: italic; }

    .color-grid {
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; padding: 4px 0;
    }
    .color-swatch {
      width: 34px; height: 34px; border-radius: 50%; border: 3px solid transparent;
      cursor: pointer; transition: all 0.15s; outline: none;
    }
    .color-swatch.selected { border-color: var(--text); transform: scale(1.18); }

    .charm-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
    .charm-card {
      background: white; border: 1.5px solid var(--pink); color: var(--text);
      font-family: 'Press Start 2P'; padding: 10px 6px; cursor: pointer;
      transition: all 0.12s; border-radius: 4px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
    }
    .charm-card.selected { background: var(--pink-light); border-color: var(--pink-dark); border-width: 2.5px; }
    .charm-card:active   { background: var(--pink-light); }
    .charm-emoji { font-size: 18px; line-height: 1; }
    .charm-label { font-size: 4px; color: var(--text-soft); line-height: 1.8; }

    .begin-btn {
      background: var(--pink-dark); color: white; border: 2px solid var(--text);
      font-family: 'Press Start 2P'; font-size: 8px; padding: 14px 28px;
      cursor: pointer; letter-spacing: 1px; transition: all 0.1s; margin-top: 4px;
    }
    .begin-btn:active { background: var(--text); transform: scale(0.97); }

    /* ── NPC CARD ── */
    .npc-card {
      background: var(--cream); border: 2px solid currentColor; border-radius: 6px;
      padding: 10px 12px; display: flex; align-items: flex-start; gap: 10px;
      animation: fadeInUp 0.35s ease;
    }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    .npc-emoji { font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px; }
    .npc-body  { display: flex; flex-direction: column; gap: 4px; text-align: left; }
    .npc-name  { font-size: 5px; color: currentColor; letter-spacing: 0.5px; }
    .npc-text  { font-size: 6px; color: var(--text); line-height: 2; font-style: italic; }

    /* ── CHECK-IN ── */
    .checkin-screen  { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .checkin-title   { font-size: 10px; color: var(--pink-dark); margin-bottom: 18px; letter-spacing: 1px; }
    .checkin-q       { font-size: 8px; color: var(--text); margin-bottom: 18px; line-height: 2; max-width: 280px; }
    .checkin-options { display: flex; flex-direction: column; gap: 9px; max-width: 260px; }
    .checkin-btn {
      background: var(--pink-light); border: 2px solid var(--pink); color: var(--text);
      font-family: 'Press Start 2P'; font-size: 7px; padding: 13px; cursor: pointer; transition: all 0.1s;
      min-height: 48px; display: flex; align-items: center; justify-content: center; text-align: center;
    }
    .checkin-btn:active { background: var(--pink); color: white; transform: scale(0.98); }

    /* ── HUB ── */
    .hub-screen { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .pet-container {
      background: white; border: 3px solid var(--pink); padding: 12px; border-radius: 8px;
      display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 340px;
    }
    .pet-top-row   { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 6px; }
    .moon-display  { font-size: 16px; line-height: 1; }
    .time-badge    { font-size: 5px; color: white; padding: 3px 6px; border-radius: 2px; letter-spacing: 0.5px; }
    .time-badge.morning   { background: #e0882a; }
    .time-badge.afternoon { background: var(--green); }
    .time-badge.evening   { background: var(--lavender); }
    .time-badge.night     { background: #3a3060; }
    .pet-mood      { font-size: 7px; color: var(--text-soft); letter-spacing: 1px; text-align: center; }
    .pet-mood-name { font-size: 10px; color: var(--pink-dark); }
    .pet-desc {
      font-size: 6px; color: var(--text); text-align: center;
      line-height: 2; margin-top: 6px; font-style: italic; min-height: 32px;
    }
    .pet-archetype { font-size: 4px; color: var(--text-soft); text-align: center; font-style: italic; margin-top: 2px; letter-spacing: 0.5px; }
    canvas.pet-canvas { image-rendering: pixelated; margin: 8px 0; display: block; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; width: 100%; margin-top: 10px; }
    .stat { background: var(--lavender-light); border: 1.5px solid var(--lavender); padding: 7px 6px; font-size: 6px; text-align: center; color: var(--text); border-radius: 4px; }
    .stat-label  { font-size: 5px; color: var(--text-soft); display: block; margin-bottom: 3px; }
    .stat-value  { font-size: 7px; color: var(--pink-dark); display: block; margin-bottom: 4px; }
    .stat-bar    { width: 100%; height: 4px; background: #ddd; border-radius: 2px; overflow: hidden; }
    .stat-bar-fill { height: 100%; background: var(--lavender); border-radius: 2px; transition: width 0.4s ease; }

    .moon-wisdom {
      font-size: 5px; color: var(--text-soft); text-align: center; line-height: 2; margin-top: 8px;
      font-style: italic; width: 100%; padding: 6px 4px 2px; border-top: 1px dashed var(--lavender);
    }
    .cycle-note       { font-size: 5px; color: var(--text-soft); text-align: center; line-height: 1.9; margin-top: 5px; width: 100%; }
    .cycle-disclaimer { font-size: 4px; color: #bbb; margin-top: 3px; }

    .nav-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; width: 100%; max-width: 340px; }
    .nav-btn {
      background: white; border: 2px solid var(--text); color: var(--text);
      font-family: 'Press Start 2P'; font-size: 4px; padding: 9px 4px; cursor: pointer; transition: all 0.1s;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      min-height: 60px; justify-content: center;
    }
    .nav-btn:active    { transform: scale(0.95); }
    .nav-btn.bedroom   { border-color: var(--lavender);  background: rgba(176,144,216,0.1); }
    .nav-btn.kitchen   { border-color: var(--orange);    background: rgba(224,144, 58,0.1); }
    .nav-btn.park      { border-color: var(--green);     background: rgba(122,184, 96,0.1); }
    .nav-btn.cafe      { border-color: var(--brown);     background: rgba(160,112, 80,0.1); }
    .nav-btn.metro     { border-color: var(--blue);      background: rgba( 88,136,200,0.1); }
    .nav-btn.beach     { border-color: var(--teal);      background: rgba( 80,176,168,0.1); }
    .nav-btn.bar       { border-color: var(--pink-dark); background: rgba(208,104,144,0.1); }
    .nav-btn.traveling { border-color: var(--rust);      background: rgba(160,104, 64,0.1); }
    .nav-icon  { font-size: 14px; line-height: 1; }
    .nav-label { font-size: 4px; letter-spacing: 0.3px; }

    .sleep-btn {
      background: #2e2660; border: 2px solid #1a1240; color: white;
      font-family: 'Press Start 2P'; font-size: 6px; padding: 11px 16px; cursor: pointer;
      width: 100%; max-width: 340px; letter-spacing: 1px; transition: all 0.1s;
    }
    .sleep-btn:active { background: #1a1240; }

    /* ── ENV SCREENS ── */
    .env-screen        { display: none; flex-direction: column; }
    .env-screen.active { display: flex; }
    .env-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 11px; padding-bottom: 9px; border-bottom: 2px solid currentColor;
    }
    .env-name { font-size: 9px; letter-spacing: 1px; }
    .env-back {
      background: transparent; border: 1.5px solid currentColor; color: inherit;
      font-family: 'Press Start 2P'; font-size: 10px; width: 28px; height: 28px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s;
    }
    .env-back:active { background: currentColor; color: var(--cream); }

    .env-bedroom   { color: var(--lavender); }
    .env-kitchen   { color: var(--orange); }
    .env-park      { color: var(--green); }
    .env-cafe      { color: var(--brown); }
    .env-metro     { color: var(--blue); }
    .env-beach     { color: var(--teal); }
    .env-bar       { color: var(--pink-dark); }
    .env-outdoor   { color: var(--green); }
    .env-indoor    { color: var(--lavender); }
    .env-social    { color: var(--pink-dark); }
    .env-traveling { color: var(--rust); }

    .env-content { flex: 1; display: flex; flex-direction: column; gap: 11px; }
    .env-pet {
      background: white; border: 2px solid currentColor; padding: 11px; border-radius: 6px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .env-time-label { font-size: 5px; color: var(--text-soft); letter-spacing: 0.5px; }
    .env-desc       { font-size: 6px; color: var(--text); text-align: center; line-height: 2; min-height: 26px; }

    /* ── MINI STATS ── */
    .env-mini-stats {
      width: 100%; padding-top: 8px; border-top: 1px dashed currentColor;
      display: flex; flex-direction: column; gap: 4px; margin-top: 2px;
    }
    .env-mini-emotion { font-size: 5px; color: var(--text-soft); text-align: center; letter-spacing: 0.5px; margin-bottom: 3px; }
    .env-mini-row  { display: flex; align-items: center; gap: 5px; }
    .env-mini-lbl  { font-size: 4px; color: var(--text-soft); width: 46px; flex-shrink: 0; }
    .env-mini-bar  { flex: 1; height: 3px; background: rgba(0,0,0,0.1); border-radius: 2px; overflow: hidden; }
    .env-mini-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .env-mini-val  { font-size: 4px; color: var(--text-soft); width: 20px; text-align: right; flex-shrink: 0; }

    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .action-btn {
      background: white; border: 1.5px solid currentColor; color: var(--text);
      font-family: 'Press Start 2P'; font-size: 5px; padding: 10px 5px; cursor: pointer; transition: all 0.1s;
      min-height: 54px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
    }
    .action-btn:active { background: currentColor; color: white; }
    .action-icon { font-size: 13px; line-height: 1; }

    .support-panel {
      background: var(--lavender-light); border: 2px solid var(--lavender);
      border-radius: 6px; padding: 10px; margin-top: auto;
    }
    .support-header { font-size: 7px; color: var(--text); margin-bottom: 8px; letter-spacing: 1px; }
    .support-btn {
      background: var(--lavender); color: white; border: 1px solid var(--lavender);
      font-family: 'Press Start 2P'; font-size: 6px; padding: 8px; cursor: pointer;
      width: 100%; transition: all 0.1s;
    }
    .support-btn:active { background: #8070c8; transform: scale(0.98); }

    .naming-input {
      font-family: 'Press Start 2P'; font-size: 8px; padding: 8px; margin-bottom: 12px;
      border: 2px solid var(--pink); background: white; color: var(--text);
      width: 100%; max-width: 200px; text-align: center;
    }
    .naming-input::placeholder { color: #ccc; }

    .event-toast {
      position: fixed; bottom: 22px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text); color: var(--cream);
      font-family: 'Press Start 2P'; font-size: 6px;
      padding: 10px 14px; border-radius: 3px; z-index: 500;
      max-width: 82%; text-align: center; line-height: 1.9;
      opacity: 0; pointer-events: none;
      transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease;
    }
    .event-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .loading { font-size: 6px; color: var(--text-soft); text-align: center; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    @media (prefers-reduced-motion: no-preference) {
      canvas.pet-canvas { animation: float 3s ease-in-out infinite; }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    }

    /* ── AMBIENT FIREBASE CHAT ─────────────────────────────────────────────────── */
.ambient-chat {
  position: fixed;
  right: 14px;
  bottom: 14px;
  width: 310px;
  max-height: 390px;
  background: var(--cream);
  border: 3px solid var(--text);
  border-radius: 6px;
  z-index: 900;
  display: flex;
  flex-direction: column;
  box-shadow: 6px 6px 0 rgba(58, 42, 74, 0.25);
  font-family: 'Press Start 2P', monospace;
}

.ambient-chat.collapsed {
  width: auto;
  height: auto;
}

.ambient-chat.collapsed .ambient-chat-body,
.ambient-chat.collapsed .ambient-chat-form {
  display: none;
}

.ambient-chat-header {
  background: var(--pink-light);
  border-bottom: 2px solid var(--pink);
  color: var(--pink-dark);
  padding: 9px 10px;
  font-size: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  line-height: 1.6;
}

.ambient-chat-toggle {
  background: white;
  border: 1.5px solid var(--pink-dark);
  color: var(--pink-dark);
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  width: 24px;
  height: 24px;
  cursor: pointer;
}

.ambient-chat-body {
  padding: 10px;
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 170px;
  max-height: 260px;
}

.ambient-chat-message {
  background: white;
  border: 1.5px solid var(--lavender);
  color: var(--text);
  padding: 8px;
  font-size: 6px;
  line-height: 1.9;
  word-break: break-word;
}

.ambient-chat-time {
  display: block;
  color: var(--text-soft);
  font-size: 4px;
  margin-top: 5px;
  line-height: 1.5;
}

.ambient-chat-form {
  border-top: 2px solid var(--pink);
  padding: 8px;
  display: flex;
  gap: 6px;
  background: rgba(255, 248, 232, 0.95);
}

.ambient-chat-input {
  flex: 1;
  min-width: 0;
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  padding: 8px;
  border: 1.5px solid var(--pink);
  color: var(--text);
  background: white;
  outline: none;
}

.ambient-chat-send {
  font-family: 'Press Start 2P', monospace;
  font-size: 5px;
  padding: 8px;
  border: 1.5px solid var(--pink-dark);
  background: var(--pink);
  color: white;
  cursor: pointer;
}

.ambient-chat-send:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

@media (max-width: 600px) {
  .ambient-chat {
    left: 10px;
    right: 10px;
    bottom: 10px;
    width: auto;
    max-height: 330px;
  }

  .ambient-chat-body {
    max-height: 200px;
  }
}

  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="title">◆ MOCHI ◆</div>
      <div class="header-sub" id="headerSub"></div>
      <div class="evo-badge" id="evoBadge"></div>
    </div>
    <div class="pet-name-display" id="petNameDisplay"></div>
    <div class="header-btns">
      <button class="btn-icon" id="inventoryBtn" title="inventory">🎒</button>
      <button class="btn-icon" id="settingsBtn"  title="rename">⚙</button>
    </div>
  </div>
  <div class="main">

let _penaltyEnv = null;

function checkPenalties(envKey) {
  for (const stat of ['calm','energy','connection','self']) {
    if ((gameState.stats[stat] || 0) <= 0) {
      gameState.stats[stat] = 0;
      _penaltyEnv = envKey || null;
      showPenaltyModal(stat);
      return true;
    }
  }
  return false;
}

function showPenaltyModal(stat) {
  const p = PENALTIES[stat];
  document.getElementById('penaltyEmoji').textContent = p.emoji;
  document.getElementById('penaltyTitle').textContent = p.title;
  document.getElementById('penaltyStat').textContent  = p.statLabel;
  document.getElementById('penaltyText').textContent  = p.text;
  document.getElementById('penaltyBtn').textContent   = p.actionLabel;
  document.getElementById('penaltyModal').dataset.stat = stat;
  document.getElementById('penaltyModal').classList.add('active');
}

function resolvePenalty() {
  const modal = document.getElementById('penaltyModal');
  const stat  = modal.dataset.stat;
  if (stat && PENALTIES[stat]) {
    gameState.stats[stat] = Math.min(100, (gameState.stats[stat] || 0) + PENALTIES[stat].recovery);
    saveGame();
  }
  modal.classList.remove('active');
  if (_penaltyEnv) showEnv(_penaltyEnv);
  else             showHub();
  _penaltyEnv = null;
}

function giveItem(envKey) {
  const c = COLLECTIBLES[envKey];
  if (!c) return;
  gameState.inventory.push({ ...c, id: Date.now() + Math.random(), day: gameState.dayCount, env: envKey });
  saveGame();
  showEventToast(`✨ ${c.emoji} found: ${c.name}`);
}

function showInventory() {
  const inv = gameState.inventory;
  document.getElementById('invCount').textContent =
    inv.length === 0 ? 'nothing yet' : `${inv.length} thing${inv.length === 1 ? '' : 's'} collected`;
  const grid = document.getElementById('inventoryGrid');
  if (inv.length === 0) {
    grid.innerHTML = `<div class="inventory-empty">explore to find small things.</div>`;
  } else {
    grid.innerHTML = [...inv].reverse().slice(0,18).map(item =>
      `<div class="inv-item">
        <span class="inv-emoji">${item.emoji}</span>
        <span class="inv-name">${item.name}</span>
        <span class="inv-day">day ${item.day || '?'}</span>
      </div>`).join('');
  }
  document.getElementById('inventoryModal').classList.add('active');
}

function closeInventory() { document.getElementById('inventoryModal').classList.remove('active'); }

let _currentEnvNPC = null;

function trySpawnNPC(envKey) {
  const npc = Object.values(NPCS).find(n => n.env === envKey);
  if (!npc || Math.random() > npc.chance) return null;

  const count     = gameState.npcMemory[npc.id] || 0;
  const encounter = npc.encounters.find(e => count >= e.min && count <= e.max);
  if (!encounter) return null;

  // Increment memory + apply stat effects
  gameState.npcMemory[npc.id] = count + 1;
  for (const [stat, delta] of Object.entries(encounter.stats)) {
    gameState.stats[stat] = Math.min(100, Math.max(0, (gameState.stats[stat] || 50) + delta));
  }
  saveGame();
  return { npc, encounter };
}

function init() {
  loadGame();
  if (!gameState.characterCreated) {
    showCreation();
  } else {
    showCheckin();
  }
  document.getElementById('settingsBtn').addEventListener('click', showNamingModal);
  document.getElementById('inventoryBtn').addEventListener('click', showInventory);
}

function loadGame() {
  const saved = localStorage.getItem('mochi_game');
  if (saved) {
    const p = JSON.parse(saved);
    gameState = { ...gameState, ...p };
    gameState.timePhase    = gameState.timePhase    ?? 'morning';
    gameState.actionsToday = gameState.actionsToday ?? 0;
    gameState.dayCount     = gameState.dayCount     ?? 1;
    gameState.moonPhase    = gameState.moonPhase    ?? 0;
    gameState.inventory    = gameState.inventory    ?? [];
    gameState.npcMemory    = gameState.npcMemory    ?? {};
  }
}

function saveGame() { localStorage.setItem('mochi_game', JSON.stringify(gameState)); }

      <button class="begin-btn" onclick="beginGame()">begin ✦</button>
    </div>`;

  document.getElementById('headerSub').textContent     = 'welcome';
  document.getElementById('evoBadge').textContent      = '';
  document.getElementById('petNameDisplay').textContent = '';
}

function selectArchetype(key) {
  _creation.archetype = key;
  document.querySelectorAll('.archetype-card').forEach(el => el.classList.remove('selected'));
  document.getElementById(`arch-${key}`)?.classList.add('selected');
}

function selectColor(key) {
  _creation.color = key;
  document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('selected'));
  document.getElementById(`col-${key}`)?.classList.add('selected');
}

function selectCharm(idx) {
  _creation.charm = idx;
  document.querySelectorAll('.charm-card').forEach(el => el.classList.remove('selected'));
  document.getElementById(`charm-${idx}`)?.classList.add('selected');
}

function beginGame() {
  if (!_creation.archetype || !_creation.color || _creation.charm === null) {
    showEventToast('choose a personality, color & charm ✦');
    return;
  }
  const name = (document.getElementById('createName')?.value || '').trim() || 'Mochi';

  // Apply archetype bonuses on top of base stats
  const arch = ARCHETYPES[_creation.archetype];
  const base = { calm:65, energy:65, connection:65, self:65 };
  for (const [stat, delta] of Object.entries(arch.stats)) {
    base[stat] = Math.min(100, Math.max(10, (base[stat] || 65) + delta));
  }

  // Add starter charm to inventory
  const charm = STARTER_CHARMS[_creation.charm];
  const starterItem = { ...charm, id: Date.now(), day: 1, env: charm.env || 'home' };

  gameState.petName          = name;
  gameState.archetype        = _creation.archetype;
  gameState.baseColor        = BASE_COLORS[_creation.color].hex;
  gameState.starterCharm     = _creation.charm;
  gameState.characterCreated = true;
  gameState.stats            = base;
  gameState.inventory        = [starterItem];

  saveGame();
  showCheckin();
}

// ─── NAMING ───────────────────────────────────────────────────────────────────
function showNamingModal() {
  document.getElementById('namingModal').classList.add('active');
  document.getElementById('namingInput').value = gameState.petName;
  document.getElementById('namingInput').focus();
}

function confirmName() {
  const name = document.getElementById('namingInput').value.trim();
  if (name) {
    gameState.petName = name;
    saveGame();
    document.getElementById('namingModal').classList.remove('active');
    if (gameState.screen === 'checkin') render();
  }
}

// ─── TIME ─────────────────────────────────────────────────────────────────────
function getTimePhase() {
  const n = gameState.actionsToday;
  if (n <= 2) return 'morning';
  if (n <= 4) return 'afternoon';
  if (n <= 6) return 'evening';
  return 'night';
}

function advanceTime() {
  gameState.actionsToday++;
  gameState.timePhase = getTimePhase();
}

function endDay() {
  gameState.dayCount++;
  gameState.moonPhase    = (gameState.moonPhase + 1) % 8;
  gameState.actionsToday = 0;
  gameState.timePhase    = 'morning';
  saveGame();
  const evo = getEvolutionPhase();
  document.getElementById('botResponse').textContent =
    `the day closes softly. mochi kept the small good things. ${evo.emoji} ${evo.name} — ${evo.tagline}`;
  document.getElementById('botModalButtons').innerHTML =
    `<button class="modal-btn" onclick="closeBotModal(); showCheckin();">new day ✦</button>`;
  document.getElementById('botModal').classList.add('active');
}

// ─── CHECK-IN ─────────────────────────────────────────────────────────────────
function showCheckin() {
  gameState.screen = 'checkin';
  const greet = { morning:'good morning', afternoon:'hey, you', evening:'still here', night:'you made it' };
  const q = CHECKIN_QUESTIONS[Math.floor(Math.random() * CHECKIN_QUESTIONS.length)];
  document.getElementById('screen').innerHTML = `
    <div class="checkin-screen">
      <div class="checkin-title">${greet[gameState.timePhase] || 'good morning'}</div>
      <div class="checkin-q">${q.q}</div>
      <div class="checkin-options">
        ${q.opts.map(o => `<button class="checkin-btn" onclick="answerCheckin('${o}')">${o}</button>`).join('')}
      </div>
    </div>`;
  updateHeader();
}

function answerCheckin(answer) {
  gameState.emotion = STATE_KEYS[answer] || 'warm';
  updateStatsFromEmotion(gameState.emotion);
  showHub();
}

function updateStatsFromEmotion(emotion) {
  const adj = {
    grounded: { calm:80, energy:60, connection:50, self:70 },
    floaty:   { calm:60, energy:40, connection:40, self:50 },
    tender:   { calm:70, energy:50, connection:80, self:75 },
    buzzy:    { calm:40, energy:85, connection:70, self:55 },
    heavy:    { calm:45, energy:30, connection:40, self:45 },
    soft:     { calm:75, energy:65, connection:75, self:70 },
    scattered:{ calm:30, energy:60, connection:35, self:25 },
    warm:     { calm:70, energy:70, connection:85, self:70 }
  };
  // Blend with archetype bonuses if set
  const base = adj[emotion] || adj.warm;
  if (gameState.archetype) {
    const arch = ARCHETYPES[gameState.archetype];
    const blended = { ...base };
    for (const [stat, delta] of Object.entries(arch.stats)) {
      blended[stat] = Math.min(100, Math.max(10, (base[stat] || 50) + Math.round(delta * 0.4)));
    }
    gameState.stats = blended;
  } else {
    gameState.stats = base;
  }
  saveGame();
}

// ─── HUB ──────────────────────────────────────────────────────────────────────
function showHub() {
  _currentEnvNPC = null;
  gameState.screen = 'hub';
  const em    = EMOTIONS[gameState.emotion];
  const moon  = MOON_PHASES[gameState.moonPhase];
  const s     = gameState.stats;
  const phase = gameState.timePhase;
  const sleepReady = gameState.actionsToday >= 4;
  const arch  = gameState.archetype ? ARCHETYPES[gameState.archetype] : null;

  const showCycle = Math.random() < 0.25;
  const cycleKeys = Object.keys(CYCLE_WISDOM);
  const ck = cycleKeys[Math.floor(Math.random() * cycleKeys.length)];
  const cl = CYCLE_WISDOM[ck][Math.floor(Math.random() * 2)];

  const envKeys = ['bedroom','kitchen','park','cafe','metro','beach','bar','traveling'];
  const navBtns = envKeys.map(k => `
    <button class="nav-btn ${k}" onclick="enterEnv('${k}')">
      <div class="nav-icon">${ENVIRONMENTS[k].icon}</div>
      <div class="nav-label">${ENVIRONMENTS[k].name}</div>
    </button>`).join('');

  document.getElementById('screen').innerHTML = `
    <div class="hub-screen">
      <div class="pet-container">
        <div class="pet-top-row">
          <div class="moon-display">${renderIcon(moon.iconKey)}</div>
          <div class="pet-mood"><div class="pet-mood-name">${em.name}</div></div>
          <div class="time-badge ${phase}">${phase}</div>
        </div>
        <canvas class="pet-canvas" id="petCanvas" width="120" height="110"></canvas>
        <div class="pet-desc">${em.desc}</div>
        ${arch ? `<div class="pet-archetype">${arch.emoji} ${arch.label} · ${arch.desc}</div>` : ''}
        <div class="stats-grid">
          ${['calm','energy','connection','self'].map(k => `
            <div class="stat">
              <span class="stat-label">${k}</span>
              <span class="stat-value">${Math.round(s[k])}%</span>
              <div class="stat-bar"><div class="stat-bar-fill" style="width:${Math.round(s[k])}%;background:${STAT_COLORS[k]}"></div></div>
            </div>`).join('')}
        </div>
        <div class="moon-wisdom">${renderIcon(moon.iconKey)} ${moon.wisdom}</div>
        ${showCycle ? `<div class="cycle-note">${cl}<div class="cycle-disclaimer">body notes are general, optional, and not medical advice.</div></div>` : ''}
      </div>
      <div class="nav-buttons">${navBtns}</div>
      ${sleepReady ? `<button class="sleep-btn" onclick="endDay()">🌙 sleep &amp; end day</button>` : ''}
    </div>`;
  drawBunny(document.getElementById('petCanvas'), gameState.emotion);
  updateHeader();
}

// ─── DRAW BUNNY ───────────────────────────────────────────────────────────────
function drawBunny(canvas, emotion) {
  if (!canvas) return;
  const ctx   = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const color      = (EMOTIONS[emotion] || EMOTIONS.warm).color;
  const innerColor = gameState.baseColor || '#ffffff';
  const px = 10;

  // Outer ears
  ctx.fillStyle = color;
  ctx.fillRect(3*px,0,2*px,4*px);
  ctx.fillRect(7*px,0,2*px,4*px);

  // Inner ears (base color — shows personalisation)
  ctx.fillStyle = innerColor;
  ctx.fillRect(3.4*px, 0.4*px, 1.2*px, 2.8*px);
  ctx.fillRect(7.4*px, 0.4*px, 1.2*px, 2.8*px);

  // Head
  ctx.fillStyle = color;
  ctx.fillRect(2*px,3*px,8*px,6*px);

  // Eyes
  if (emotion === 'heavy') {
    ctx.fillStyle = '#000';
    ctx.fillRect(3*px,5*px,1*px,1*px); ctx.fillRect(8*px,5*px,1*px,1*px);
  } else if (emotion === 'tender') {
    ctx.fillStyle = '#000';
    ctx.fillRect(3.5*px,4.5*px,1.5*px,2*px); ctx.fillRect(7.5*px,4.5*px,1.5*px,2*px);
  } else {
    ctx.fillStyle = '#000';
    ctx.fillRect(3*px,5*px,2*px,2*px); ctx.fillRect(7*px,5*px,2*px,2*px);
    ctx.fillStyle = '#fff';
    ctx.fillRect(3.5*px,5.3*px,0.8*px,0.8*px); ctx.fillRect(7.5*px,5.3*px,0.8*px,0.8*px);
  }

  // Mouth
  if (emotion === 'warm' || emotion === 'soft') {
    ctx.strokeStyle = '#000'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.arc(5*px,8*px,1*px,0,Math.PI); ctx.stroke();
  } else if (emotion === 'heavy') {
    ctx.fillStyle = '#000'; ctx.fillRect(4.5*px,8*px,1*px,0.5*px);
  }

  // Body & feet
  ctx.fillStyle = color;
  ctx.fillRect(2.5*px,9*px,7*px,4*px);
  ctx.fillRect(3*px,13*px,2*px,1.5*px); ctx.fillRect(7*px,13*px,2*px,1.5*px);
}

// ─── ENV ──────────────────────────────────────────────────────────────────────
function enterEnv(env) {
  gameState.currentEnv = env;
  gameState.screen     = 'env';
  _currentEnvNPC       = trySpawnNPC(env); // roll NPC on entry
  showEnv(env);
}

function showEnv(envKey) {
  const legacyMap = { outdoor:'park', indoor:'bedroom', social:'bar' };
  const key = legacyMap[envKey] || envKey;
  const e   = ENVIRONMENTS[key];
  if (!e) { showHub(); return; }

  const desc = e.descByTime[gameState.timePhase] || e.descByTime.afternoon;
  const em   = EMOTIONS[gameState.emotion];
  const s    = gameState.stats;

  const npcHtml = _currentEnvNPC ? `
    <div class="npc-card">
      <span class="npc-emoji">${_currentEnvNPC.npc.emoji}</span>
      <div class="npc-body">
        <div class="npc-name">${_currentEnvNPC.npc.name}</div>
        <div class="npc-text">${_currentEnvNPC.encounter.text}</div>
      </div>
    </div>` : '';

  document.getElementById('screen').innerHTML = `
    <div class="env-screen active ${e.envClass}">
      <div class="env-header">
        <div class="env-name">${e.icon} ${e.name}</div>
        <button class="env-back" onclick="showHub()">←</button>
      </div>
      <div class="env-content">
        <div class="env-pet">
          <canvas class="pet-canvas" id="envCanvas" width="100" height="90"></canvas>
          <div class="env-time-label">${gameState.timePhase}</div>
          <div class="env-desc">${desc}</div>
          <div class="env-mini-stats">
            <div class="env-mini-emotion">${em.name}</div>
            ${['calm','energy','connection','self'].map(k => `
              <div class="env-mini-row">
                <span class="env-mini-lbl">${k}</span>
                <div class="env-mini-bar"><div class="env-mini-fill" style="width:${Math.round(s[k])}%;background:${STAT_COLORS[k]}"></div></div>
                <span class="env-mini-val">${Math.round(s[k])}%</span>
              </div>`).join('')}
          </div>
        </div>
        ${npcHtml}
        <div class="actions">
          ${e.actions.map((a,i) => `
            <button class="action-btn" onclick="doAction('${key}',${i})">
              <div class="action-icon">${a.icon}</div>
              <div>${a.label}</div>
            </button>`).join('')}
        </div>
        <div class="support-panel">
          <div class="support-header">feeling stuck?</div>
          <button class="support-btn" onclick="askBot('${key}')">💙 ask for support</button>
        </div>
      </div>
    </div>`;
  drawBunny(document.getElementById('envCanvas'), gameState.emotion);
  updateHeader();
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function pickRandom(arr, lastIdx) {
  if (arr.length <= 1) return { item: arr[0], idx: 0 };
  let idx;
  do { idx = Math.floor(Math.random() * arr.length); } while (idx === lastIdx);
  return { item: arr[idx], idx };
}

function doAction(envKey, actionIndex) {
  const e = ENVIRONMENTS[envKey]; if (!e) return;
  const a = e.actions[actionIndex]; if (!a) return;

  gameState.stats[a.stat] = Math.min(100, (gameState.stats[a.stat] || 50) + a.amount);
  if (a.riskStat) {
    gameState.stats[a.riskStat] = Math.max(0, (gameState.stats[a.riskStat] || 50) + a.riskAmount);
  }

  // Item drops
  if (a.dropItem && Math.random() < 0.45) giveItem(envKey);
  else if (!a.dropItem && Math.random() < 0.10) giveItem(envKey);

  // Emotion shift
  if (Math.random() < 0.35) {
    const ems = Object.keys(EMOTIONS);
    gameState.emotion = ems[Math.floor(Math.random() * ems.length)];
  }

  advanceTime();
  saveGame();

  if (checkPenalties(envKey)) return;

  // ── Primary event: 72% global OR env-specific ──────────────────────────────
  if (Math.random() < 0.72) {
    // 45% of event slots go to env-specific events
    const envPool = ENV_EVENTS[envKey];
    let ev;
    if (envPool && Math.random() < 0.45) {
      ev = envPool[Math.floor(Math.random() * envPool.length)];
    } else {
      ev = RANDOM_EVENTS[Math.floor(Math.random() * RANDOM_EVENTS.length)];
    }
    if (ev.stat && ev.amount) {
      gameState.stats[ev.stat] = Math.min(100, Math.max(0, (gameState.stats[ev.stat] || 50) + ev.amount));
    }
    showEventToast(ev.text);

    // ── Bonus second event: 38% chance after the first ───────────────────────
    if (Math.random() < 0.38) {
      const ev2 = RANDOM_EVENTS[Math.floor(Math.random() * RANDOM_EVENTS.length)];
      if (ev2.stat && ev2.amount) {
        gameState.stats[ev2.stat] = Math.min(100, Math.max(0, (gameState.stats[ev2.stat] || 50) + ev2.amount));
      }
      // Show second toast after a short delay so they don't overlap
      setTimeout(() => showEventToast(ev2.text), 3600);
    }

    saveGame();
  }

  showEnv(envKey);
}

function showEventToast(text) {
  const t = document.getElementById('eventToast');
  t.textContent = text;
  t.classList.remove('show');
  // Force reflow to restart animation
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

// ─── BOT (local phrases, instant, no-repeat) ──────────────────────────────────
function askBot(envKey) {
  const pool  = SUPPORT_PHRASES[envKey] || SUPPORT_PHRASES.park;
  const last  = _lastSupportIdx[envKey] ?? -1;
  const { item: phrase, idx } = pickRandom(pool, last);
  _lastSupportIdx[envKey] = idx;

  const botModal    = document.getElementById('botModal');
  const botResponse = document.getElementById('botResponse');
  const botButtons  = document.getElementById('botModalButtons');
  botResponse.textContent = phrase;
  botButtons.innerHTML    = `<button class="modal-btn" onclick="closeBotModal()">close</button>`;
  botModal.classList.add('active');
}

function closeBotModal() {
  document.getElementById('botModal').classList.remove('active');
  document.getElementById('botModalButtons').innerHTML =
    `<button class="modal-btn" onclick="closeBotModal()">close</button>`;
}

// ─── HEADER ───────────────────────────────────────────────────────────────────
function updateHeader() {
  const moon = MOON_PHASES[gameState.moonPhase];
  const evo  = getEvolutionPhase();
  document.getElementById('petNameDisplay').textContent = gameState.petName;
  document.getElementById('headerSub').textContent =
    `day ${gameState.dayCount}  ·  ${PIXEL_ICONS[moon.iconKey]}  ${moon.name}`;
  document.getElementById('evoBadge').textContent = `${evo.emoji} ${evo.name}`;
}

function render() {
  if      (gameState.screen === 'hub')      showHub();
  else if (gameState.screen === 'checkin')  showCheckin();
  else if (gameState.screen === 'env')      showEnv(gameState.currentEnv);
  else if (gameState.screen === 'creation') showCreation();
}

init();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import {
    getAuth,
    signInAnonymously,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import {
    getDatabase,
    ref,
    push,
    set,
    query,
    limitToLast,
    onChildAdded
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhtSPmpoRn3fKdY7G3yUVwlShP597vF4s",
    authDomain: "mochi-ded2f.firebaseapp.com",
    databaseURL: "https://mochi-ded2f-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "mochi-ded2f",
    storageBucket: "mochi-ded2f.firebasestorage.app",
    messagingSenderId: "529413992493",
    appId: "1:529413992493:web:ebd9bc18d831815ee088a4",
    measurementId: "G-8NXF3MHVPB"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const chat = document.getElementById("ambientChat");
  const toggle = document.getElementById("ambientChatToggle");
  const messagesEl = document.getElementById("ambientChatMessages");
  const form = document.getElementById("ambientChatForm");
  const input = document.getElementById("ambientChatInput");
  const sendButton = document.getElementById("ambientChatSend");

  let isChatReady = false;
  let hasLoadedFirstMessage = false;

  toggle.addEventListener("click", () => {
    chat.classList.toggle("collapsed");
    toggle.textContent = chat.classList.contains("collapsed") ? "+" : "−";
  });

  signInAnonymously(auth).catch((error) => {
    console.error("Anonymous sign-in failed:", error);
    messagesEl.innerHTML = `
      <div class="ambient-chat-message">
        chat unavailable. anonymous auth failed.
      </div>
    `;
  });

  onAuthStateChanged(auth, (user) => {
    if (!user) return;
    isChatReady = true;
    sendButton.disabled = false;
  });

  const messagesRef = ref(db, "messages");
  const recentMessagesQuery = query(messagesRef, limitToLast(40));

  onChildAdded(recentMessagesQuery, (snapshot) => {
    const message = snapshot.val();

    if (!hasLoadedFirstMessage) {
      messagesEl.innerHTML = "";
      hasLoadedFirstMessage = true;
    }

    renderAmbientMessage(message);
  });

  form.addEventListener("submit", async (event) => {
    event.preventDefault();

    if (!isChatReady) return;

    const text = input.value.trim();

    if (!text) return;
    if (text.length > 300) return;

    input.value = "";
    sendButton.disabled = true;

    try {
      const newMessageRef = push(messagesRef);

      await set(newMessageRef, {
        text,
        createdAt: Date.now()
      });
    } catch (error) {
      console.error("Message send failed:", error);
      alert("Message could not be sent.");
    } finally {
      sendButton.disabled = false;
      input.focus();
    }
  });

  function renderAmbientMessage(message) {
    if (!message || typeof message.text !== "string") return;

    const wrapper = document.createElement("div");
    wrapper.className = "ambient-chat-message";

    const text = document.createElement("span");
    text.textContent = message.text;

    const time = document.createElement("span");
    time.className = "ambient-chat-time";

    if (typeof message.createdAt === "number") {
      const date = new Date(message.createdAt);
      time.textContent = date.toLocaleString("en-GB", {
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    wrapper.appendChild(text);
    wrapper.appendChild(time);
    messagesEl.appendChild(wrapper);

    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
</script>
